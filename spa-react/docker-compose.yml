services:
  spa-react:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - HOME=/app
      - npm_config_cache=/app/.npm-cache
    command: sh -c "[ -d node_modules/vite ] || npm install; npm run dev -- --host"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173/"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s