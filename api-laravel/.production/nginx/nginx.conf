server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Raiz do projeto Laravel (subpasta public)
    root /var/www/html/public;
    index index.php index.html index.htm;

    # Nome do servidor (ajuste se necessário)
    server_name _; # Escuta em qualquer hostname

    location / {
        # Tenta servir o arquivo diretamente, depois como diretório, depois fallback para index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Redireciona todo o tráfego PHP para o container PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # IMPORTANTE: Use o nome do serviço FPM ou localhost:9000
        # Se Nginx e FPM estão na mesma Task Definition do ECS, eles podem se comunicar via localhost
        # fastcgi_pass 127.0.0.1:9000;
        # Se estiver usando Service Discovery ou nomes DNS do ECS, use o nome do container FPM:
        # Assumindo que o container FPM se chama 'php-fpm-app' na Task Definition:
        fastcgi_pass 127.0.0.1:9000;

        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Aumenta timeouts para evitar erros 504 em requests longas
        fastcgi_read_timeout 300;
    }

    # Bloqueia acesso a arquivos ocultos (ex: .env)
    location ~ /\.ht {
        deny all;
    }

    # Otimizações para assets estáticos (opcional)
    location ~* \.(css|js|gif|ico|jpeg|jpg|png|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Configuração de Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
